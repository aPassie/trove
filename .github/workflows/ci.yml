name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-frontend:
    name: Verify Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Typecheck
        run: bun run --cwd web typecheck

      - name: Run Web Unit Tests
        run: bun run --cwd web test

      - name: Run Next.js Build
        run: bun run --cwd web build
        env:
          NEXT_PUBLIC_HERO_VIDEO_URL: "https://ci8w4apv5qhhvpkg.public.blob.vercel-storage.com/final.mp4"

  verify-backend:
    name: Verify Engine (Go + WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Go Dependencies
        run: cd services/backend && go mod download

      - name: Run go vet
        run: cd services/backend && go vet ./...

      - name: Run Go Unit Tests
        run: cd services/backend && go test -race -cover ./...

      - name: Verify WASM build (client engine)
        run: cd services/backend && GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/wasm
